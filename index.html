<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動作確認用インデックス</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #2c3e50;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 10px;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            margin-bottom: 12px;
        }
        a {
            display: block;
            padding: 12px 16px;
            background-color: #f8fafc;
            color: #3182ce;
            text-decoration: none;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }
        a:hover {
            background-color: #ebf8ff;
            border-color: #bee3f8;
            color: #2b6cb0;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>動作確認用リンク一覧</h1>
    <ul id="link-list">
        <!-- ここにJavaScriptで自動的にリンクが生成されます -->
    </ul>
</div>

<script>
    // ==========================================
    // 【リンクの追加・変更はここを変更するだけ！】
    // ==========================================
    const pages = [
        { url: "super-marubatsu.html", title: "スーパー○×ゲーム" },
        { url: "test-page.html",       title: "テストページ（サンプル）" },
        // 新しいページを増やしたいときは、下にカンマ区切りで追加していけます
        // 例: { url: "game2.html", title: "新しいゲーム" }
    ];

    // リンクを自動生成する処理
    const listContainer = document.getElementById('link-list');
    pages.forEach(page => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = page.url;
        a.textContent = page.title;
        
        // ローカル環境(file://)とサーバー環境(GitHub Pages等)の両方で動きやすくするため
        // ターゲットを別タブ(_blank)にしておくと確認がスムーズです
        a.target = "_blank"; 
        
        li.appendChild(a);
        listContainer.appendChild(li);
    });
</script>

</body>
</html>
